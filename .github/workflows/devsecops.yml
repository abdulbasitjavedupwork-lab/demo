# =============================================================================
# DevSecOps CI/CD Pipeline — Spring Boot Demo (com.rashone)
#
# Pipeline stages
#   1. SAST        — Semgrep static analysis            → HTML artifact (informational)
#   2. Build & Test— Maven build + JUnit                 → HTML artifact (hard gate)
#   3. Image Scan  — Trivy container vulnerability scan  → HTML artifact (informational)
#   4. Push to ECR — Tag and push verified image
#   5. Deploy      — ECS rolling update (wait for stable)
#   6. Validate    — Smoke test + HTML validation report → HTML artifact
#
# Required GitHub Secrets  (Settings → Secrets and variables → Actions → Secrets)
#   AWS_ACCESS_KEY_ID        IAM access key with ECR push + ECS deploy permissions
#   AWS_SECRET_ACCESS_KEY    Matching IAM secret key
#
# Required GitHub Variables (Settings → Secrets and variables → Actions → Variables)
#   AWS_REGION               e.g. us-east-1
#   ECR_REGISTRY             e.g. 123456789012.dkr.ecr.us-east-1.amazonaws.com
#   ECR_REPOSITORY           e.g. demo
#   ECS_CLUSTER              e.g. my-cluster
#   ECS_SERVICE              e.g. demo-service
#   ECS_TASK_DEFINITION      e.g. demo-task
#   CONTAINER_NAME           e.g. demo   (must match the container name in the task def)
#   APP_URL                  e.g. http://my-alb-dns.us-east-1.elb.amazonaws.com
# =============================================================================

name: DevSecOps CI/CD Pipeline

on:
  push:
    branches: [main]
  workflow_dispatch:

# Minimum permissions at workflow level; each job overrides where needed
permissions:
  contents: read

env:
  JAVA_VERSION: '17'
  # Image tag is the commit SHA so every build is uniquely traceable
  IMAGE_TAG: ${{ github.sha }}

# ─────────────────────────────────────────────────────────────────────────────
# JOB 1 — SAST: Semgrep static-analysis security testing
# ─────────────────────────────────────────────────────────────────────────────
jobs:
  sast:
    name: "SAST — Semgrep"
    runs-on: ubuntu-latest
    permissions:
      contents: read

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install Semgrep
        run: pip install semgrep --quiet

      - name: Run Semgrep scan
        # exit 0 so the pipeline continues; findings are captured in the report
        run: |
          semgrep scan \
            --config=auto \
            --json \
            --output=semgrep-results.json \
            . || true

      - name: Generate Semgrep HTML report
        run: |
          python3 - <<'PYEOF'
          import json, html, os

          try:
              with open("semgrep-results.json") as f:
                  data = json.load(f)
          except Exception:
              data = {}

          results = data.get("results", [])
          errors  = data.get("errors",  [])
          commit  = os.environ.get("GITHUB_SHA", "unknown")[:8]
          repo    = os.environ.get("GITHUB_REPOSITORY", "")

          SEVERITY_COLOR = {
              "ERROR":   "#d32f2f",
              "WARNING": "#f57c00",
              "INFO":    "#0288d1",
          }

          rows = ""
          for r in results:
              sev   = r.get("extra", {}).get("severity", "INFO")
              color = SEVERITY_COLOR.get(sev, "#555")
              rows += f"""
              <tr>
                <td><span style="color:{color};font-weight:bold">{html.escape(sev)}</span></td>
                <td style="font-family:monospace;font-size:0.85em">{html.escape(r.get('check_id', ''))}</td>
                <td>{html.escape(r.get('path', ''))}</td>
                <td style="text-align:center">{r.get('start', {}).get('line', '')}</td>
                <td>{html.escape(r.get('extra', {}).get('message', ''))}</td>
              </tr>"""

          no_findings = '<tr><td colspan="5" style="text-align:center;color:#2e7d32;padding:20px">&#10003; No findings detected</td></tr>'

          report = f"""<!DOCTYPE html>
          <html lang="en">
          <head>
            <meta charset="UTF-8">
            <meta name="viewport" content="width=device-width,initial-scale=1">
            <title>SAST Report — Semgrep</title>
            <style>
              * {{ box-sizing: border-box; margin: 0; padding: 0; }}
              body {{ font-family: 'Segoe UI', Arial, sans-serif; background: #f0f2f5; color: #333; padding: 24px; }}
              h1 {{ font-size: 1.6em; color: #1a237e; border-bottom: 3px solid #1a237e; padding-bottom: 10px; margin-bottom: 20px; }}
              .meta {{ background: #fff; border-radius: 8px; padding: 14px 18px; margin-bottom: 20px;
                       box-shadow: 0 2px 6px rgba(0,0,0,.08); display: flex; gap: 30px; flex-wrap: wrap; }}
              .meta span {{ font-size: 0.9em; color: #555; }}
              .meta strong {{ color: #1a237e; }}
              table {{ width: 100%; border-collapse: collapse; background: #fff; border-radius: 8px;
                       overflow: hidden; box-shadow: 0 2px 6px rgba(0,0,0,.08); }}
              th {{ background: #1a237e; color: #fff; padding: 12px 14px; text-align: left; font-size: 0.9em; }}
              td {{ padding: 10px 14px; border-bottom: 1px solid #eee; font-size: 0.88em; vertical-align: top; }}
              tr:last-child td {{ border-bottom: none; }}
              tr:hover td {{ background: #e8eaf6; }}
              .tool-badge {{ background: #1a237e; color: #fff; padding: 2px 8px; border-radius: 10px; font-size: 0.8em; }}
            </style>
          </head>
          <body>
            <h1>&#128270; SAST Report — Semgrep</h1>
            <div class="meta">
              <span><strong>Tool:</strong> <span class="tool-badge">Semgrep</span></span>
              <span><strong>Findings:</strong> {len(results)}</span>
              <span><strong>Scan Errors:</strong> {len(errors)}</span>
              <span><strong>Commit:</strong> {html.escape(commit)}</span>
              <span><strong>Repository:</strong> {html.escape(repo)}</span>
            </div>
            <table>
              <thead>
                <tr>
                  <th>Severity</th><th>Rule ID</th><th>File</th><th>Line</th><th>Message</th>
                </tr>
              </thead>
              <tbody>{rows if rows else no_findings}</tbody>
            </table>
          </body>
          </html>"""

          with open("sast-report.html", "w") as f:
              f.write(report)
          print(f"SAST report: {len(results)} finding(s).")
          PYEOF

      - name: Upload SAST report
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: report-sast-semgrep
          path: sast-report.html
          retention-days: 30

# ─────────────────────────────────────────────────────────────────────────────
# JOB 2 — Build & Unit Tests
#   (SCA / OWASP Dependency Check was removed — the NVD download with no API key
#    burned free Actions minutes for little value on a throwaway demo.)
# ─────────────────────────────────────────────────────────────────────────────
  build-and-test:
    name: "Build & Test"
    runs-on: ubuntu-latest
    permissions:
      contents: read

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Java ${{ env.JAVA_VERSION }}
        uses: actions/setup-java@v4
        with:
          java-version: ${{ env.JAVA_VERSION }}
          distribution: temurin
          cache: maven

      - name: Build and run tests
        run: ./mvnw verify -B --no-transfer-progress

      - name: Generate Surefire HTML report
        if: always()
        run: |
          ./mvnw surefire-report:report-only -B --no-transfer-progress || true

      - name: Upload test report
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: report-unit-tests-surefire
          path: target/site/surefire-report.html
          retention-days: 30

      - name: Upload compiled JAR
        uses: actions/upload-artifact@v4
        with:
          name: app-jar
          path: target/demo-0.0.1-SNAPSHOT.jar
          # Short retention — only needed to seed the container-scan job
          retention-days: 1

# ─────────────────────────────────────────────────────────────────────────────
# JOB 3 — Container image build + Trivy vulnerability scan
# ─────────────────────────────────────────────────────────────────────────────
  container-scan:
    name: "Container Scan — Trivy (informational)"
    runs-on: ubuntu-latest
    needs: [build-and-test]
    # Informational gate: report vulnerabilities but never block the pipeline.
    # A failure here (scan tooling or findings) does not fail the run or stop push-to-ecr.
    continue-on-error: true
    permissions:
      contents: read

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build Docker image (local, not pushed)
        uses: docker/build-push-action@v6
        with:
          context: .
          push: false
          # Local-only tag for scanning; independent of the ECR_REPOSITORY variable
          # (which isn't needed here and may be unset early on).
          tags: demo:${{ env.IMAGE_TAG }}
          load: true
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Install Trivy
        run: |
          curl -sSfL https://raw.githubusercontent.com/aquasecurity/trivy/main/contrib/install.sh \
            | sh -s -- -b /usr/local/bin

      - name: Download Trivy HTML template
        run: |
          curl -sSfL \
            https://raw.githubusercontent.com/aquasecurity/trivy/main/contrib/html.tpl \
            -o trivy.html.tpl

      - name: Run Trivy image scan
        # exit-code 0 — report findings without failing the job;
        # Change to 1 to gate on CRITICAL/HIGH vulnerabilities.
        run: |
          trivy image \
            --format template \
            --template "@trivy.html.tpl" \
            --output trivy-report.html \
            --severity CRITICAL,HIGH,MEDIUM \
            --exit-code 0 \
            demo:${{ env.IMAGE_TAG }}

      - name: Upload Trivy report
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: report-container-scan-trivy
          path: trivy-report.html
          retention-days: 30

# ─────────────────────────────────────────────────────────────────────────────
# JOB 4 — Push verified image to AWS ECR
# Runs only on pushes to main after all security gates pass.
# ─────────────────────────────────────────────────────────────────────────────
  push-to-ecr:
    name: "Push to AWS ECR"
    runs-on: ubuntu-latest
    # build-and-test is the ONLY gate. sast and container-scan are informational and run
    # in parallel — they never block the push or the deploy that follows it.
    needs: [build-and-test]
    permissions:
      contents: read

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ secrets.AWS_REGION }}

      - name: Login to Amazon ECR
        id: login-ecr
        uses: aws-actions/amazon-ecr-login@v2

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build and push to ECR
        uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          tags: |
            ${{ secrets.ECR_REGISTRY }}/${{ secrets.ECR_REPOSITORY }}:${{ env.IMAGE_TAG }}
            ${{ secrets.ECR_REGISTRY }}/${{ secrets.ECR_REPOSITORY }}:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max
          labels: |
            org.opencontainers.image.revision=${{ github.sha }}
            org.opencontainers.image.source=${{ github.server_url }}/${{ github.repository }}
            org.opencontainers.image.created=${{ github.event.head_commit.timestamp }}

# ─────────────────────────────────────────────────────────────────────────────
# JOB 5 — Deploy to AWS ECS
# ─────────────────────────────────────────────────────────────────────────────
  deploy:
    name: "Deploy to AWS ECS"
    runs-on: ubuntu-latest
    needs: [push-to-ecr]
    permissions:
      contents: read

    steps:
      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ secrets.AWS_REGION }}

      - name: Download current ECS task definition
        run: |
          aws ecs describe-task-definition \
            --task-definition ${{ secrets.ECS_TASK_DEFINITION }} \
            --query taskDefinition \
            > task-definition.json

      - name: Inject new image into task definition
        id: task-def
        uses: aws-actions/amazon-ecs-render-task-definition@v1
        with:
          task-definition: task-definition.json
          container-name: ${{ secrets.CONTAINER_NAME }}
          # Built directly from secrets here. It can't be passed via a job output:
          # GitHub redacts outputs that contain secret values (ECR_REGISTRY/REPOSITORY),
          # so needs.push-to-ecr.outputs.image-uri arrives empty.
          image: ${{ secrets.ECR_REGISTRY }}/${{ secrets.ECR_REPOSITORY }}:${{ env.IMAGE_TAG }}

      - name: Register and deploy new task definition to ECS
        uses: aws-actions/amazon-ecs-deploy-task-definition@v2
        with:
          task-definition: ${{ steps.task-def.outputs.task-definition }}
          service: ${{ secrets.ECS_SERVICE }}
          cluster: ${{ secrets.ECS_CLUSTER }}
          # Block until the service reaches a steady state before proceeding
          wait-for-service-stability: true

# ─────────────────────────────────────────────────────────────────────────────
# JOB 6 — Post-deploy smoke tests & validation report
# ─────────────────────────────────────────────────────────────────────────────
  validate:
    name: "Post-Deploy Validation"
    runs-on: ubuntu-latest
    needs: [deploy]
    permissions:
      contents: read

    steps:
      - name: Run smoke tests
        id: smoke
        env:
          APP_URL: ${{ secrets.APP_URL }}
        run: |
          MAX_RETRIES=12
          RETRY_WAIT=15
          PASSED=0
          FAILED=0

          # ── helpers ──────────────────────────────────────────────────────
          check() {
            local name="$1" url="$2" expected_code="$3" expected_body="$4"
            local http_code body result notes

            http_code=$(curl -s -o /tmp/resp_body.txt -w "%{http_code}" \
                          --connect-timeout 10 --max-time 30 "$url")
            body=$(cat /tmp/resp_body.txt)

            if [ "$http_code" != "$expected_code" ]; then
              result="FAIL"; notes="Expected HTTP $expected_code, got $http_code"
              FAILED=$((FAILED + 1))
            elif [ -n "$expected_body" ] && ! echo "$body" | grep -qF "$expected_body"; then
              result="FAIL"; notes="Body missing: '$expected_body'"
              FAILED=$((FAILED + 1))
            else
              result="PASS"; notes=""
              PASSED=$((PASSED + 1))
            fi

            echo "${name}|${url}|${http_code}|${result}|${notes}" >> /tmp/smoke_results.txt
          }

          # ── wait until app is reachable ───────────────────────────────────
          echo "Waiting for $APP_URL to become available..."
          for i in $(seq 1 $MAX_RETRIES); do
            if curl -sf --connect-timeout 5 "$APP_URL/" > /dev/null 2>&1; then
              echo "Reachable after attempt $i"; break
            fi
            echo "Attempt $i/$MAX_RETRIES — retrying in ${RETRY_WAIT}s"
            sleep $RETRY_WAIT
          done

          # ── test cases ───────────────────────────────────────────────────
          check "Root endpoint returns 200"          "$APP_URL/"           "200" ""
          check "Root endpoint body contains greeting" "$APP_URL/"         "200" "Good Morning"

          # Export counters for the report step
          echo "SMOKE_PASSED=$PASSED"  >> $GITHUB_ENV
          echo "SMOKE_FAILED=$FAILED"  >> $GITHUB_ENV

      - name: Generate validation HTML report
        if: always()
        env:
          APP_URL: ${{ secrets.APP_URL }}
        run: |
          python3 - <<'PYEOF'
          import os, datetime, html

          passed = int(os.environ.get("SMOKE_PASSED", 0))
          failed = int(os.environ.get("SMOKE_FAILED", 0))
          total  = passed + failed
          commit = os.environ.get("GITHUB_SHA",       "unknown")[:8]
          repo   = os.environ.get("GITHUB_REPOSITORY","")
          app    = os.environ.get("APP_URL",          "")
          now    = datetime.datetime.utcnow().strftime("%Y-%m-%d %H:%M UTC")

          overall_pass    = failed == 0
          overall_color   = "#2e7d32" if overall_pass else "#c62828"
          overall_text    = "&#10003; ALL TESTS PASSED" if overall_pass else f"&#10007; {failed} TEST(S) FAILED"
          banner_bg       = "#e8f5e9" if overall_pass else "#ffebee"

          rows = ""
          try:
              with open("/tmp/smoke_results.txt") as f:
                  for line in f:
                      parts = line.strip().split("|")
                      if len(parts) < 4:
                          continue
                      name, url, code, result, *note_parts = parts
                      note  = "|".join(note_parts)
                      color = "#2e7d32" if result == "PASS" else "#c62828"
                      icon  = "&#10003;" if result == "PASS" else "&#10007;"
                      rows += f"""
                      <tr>
                        <td>{html.escape(name)}</td>
                        <td style="font-family:monospace;font-size:0.85em">{html.escape(url)}</td>
                        <td style="text-align:center">{html.escape(code)}</td>
                        <td style="text-align:center">
                          <span style="color:{color};font-weight:bold">{icon} {html.escape(result)}</span>
                        </td>
                        <td style="color:#666">{html.escape(note)}</td>
                      </tr>"""
          except FileNotFoundError:
              rows = '<tr><td colspan="5" style="color:#888">No results file found.</td></tr>'

          report = f"""<!DOCTYPE html>
          <html lang="en">
          <head>
            <meta charset="UTF-8">
            <meta name="viewport" content="width=device-width,initial-scale=1">
            <title>Post-Deploy Validation Report</title>
            <style>
              * {{ box-sizing: border-box; margin: 0; padding: 0; }}
              body {{ font-family: 'Segoe UI', Arial, sans-serif; background: #f0f2f5; color: #333; padding: 24px; }}
              h1 {{ font-size: 1.6em; color: #1a237e; border-bottom: 3px solid #1a237e;
                    padding-bottom: 10px; margin-bottom: 20px; }}
              .banner {{ background: {banner_bg}; border: 1px solid {overall_color}; border-radius: 8px;
                         padding: 16px 20px; margin-bottom: 20px; font-size: 1.1em;
                         font-weight: bold; color: {overall_color}; }}
              .summary {{ display: flex; gap: 14px; margin-bottom: 20px; flex-wrap: wrap; }}
              .card {{ background: #fff; border-radius: 8px; padding: 14px 22px; min-width: 110px;
                       box-shadow: 0 2px 6px rgba(0,0,0,.08); text-align: center; }}
              .card .num {{ font-size: 2em; font-weight: bold; }}
              .pass {{ color: #2e7d32; }} .fail {{ color: #c62828; }} .info {{ color: #1565c0; }}
              table {{ width: 100%; border-collapse: collapse; background: #fff; border-radius: 8px;
                       overflow: hidden; box-shadow: 0 2px 6px rgba(0,0,0,.08); }}
              th {{ background: #1a237e; color: #fff; padding: 12px 14px; text-align: left; font-size: 0.9em; }}
              td {{ padding: 10px 14px; border-bottom: 1px solid #eee; font-size: 0.88em; vertical-align: top; }}
              tr:last-child td {{ border-bottom: none; }}
              tr:hover td {{ background: #e8eaf6; }}
            </style>
          </head>
          <body>
            <h1>&#128202; Post-Deploy Validation Report</h1>
            <div class="banner">{overall_text}</div>
            <div class="summary">
              <div class="card"><div class="num info">{total}</div><div>Total</div></div>
              <div class="card"><div class="num pass">{passed}</div><div>Passed</div></div>
              <div class="card"><div class="num fail">{failed}</div><div>Failed</div></div>
              <div class="card" style="min-width:200px">
                <div style="font-size:0.85em;color:#555">
                  <div><strong>Commit:</strong> {html.escape(commit)}</div>
                  <div><strong>App URL:</strong> {html.escape(app)}</div>
                  <div><strong>Repo:</strong> {html.escape(repo)}</div>
                  <div><strong>Time:</strong> {now}</div>
                </div>
              </div>
            </div>
            <table>
              <thead>
                <tr>
                  <th>Test Name</th><th>URL</th><th>HTTP Code</th><th>Result</th><th>Notes</th>
                </tr>
              </thead>
              <tbody>{rows}</tbody>
            </table>
          </body>
          </html>"""

          with open("validation-report.html", "w") as f:
              f.write(report)
          print(f"Validation report: {passed} passed, {failed} failed.")
          PYEOF

      - name: Upload validation report
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: report-post-deploy-validation
          path: validation-report.html
          retention-days: 30

      - name: Report smoke test result (non-blocking)
        if: env.SMOKE_FAILED != '0'
        run: |
          echo "::warning::${{ env.SMOKE_FAILED }} smoke test(s) failed (non-blocking for demo). See the validation report artifact."
